[env:wemos_d1_r32]
platform = espressif32
; Меняем плату на стандартную для этого форм-фактора
board = esp32dev 
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ILI9341
    XPT2046_Touchscreen
    mathertel/OneButton
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.8
    https://github.com/esphome/ESPAsyncWebServer.git


platform_packages =
    framework-arduinoespressif32

board_build.flash_mode = qio
board_build.bootloader = dio
board_build.partitions = min_spiffs.csv
build_flags =
    -Wdouble-promotion
    -Wimplicit-fallthrough
    -DCORE_DEBUG_LEVEL=3
    ; Убираем -DBOARD_HAS_PSRAM, так как на обычной D1 R32 её нет
    ; Если возникнут ошибки компиляции аудио, проверьте настройки буфера
